name: Update Daily Menu

on:
  # Runs every day at 11:00 UTC = 6:00 AM CT (adjusts for DST automatically)
  schedule:
    - cron: "0 11 * * *"

  # Also lets you trigger it manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python scrape.py

      - name: Commit and push menu.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add menu.json
          # Only commit if menu.json actually changed
          git diff --cached --quiet || git commit -m "chore: update menu for $(date +%Y-%m-%d)"
          git push
